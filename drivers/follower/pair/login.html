<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /*
      Styled with Homey's own Style Library (`.homey-form-*` / `.homey-button-*` / `.homey-header`
      classes - see https://apps.developer.homey.app/advanced/custom-views/html-and-css-styling)
      rather than the hand-approximated `var(--homey-*)` tokens with static fallbacks this file
      used until now. The Style Library is Homey's own real, themed component set, documented as
      available on Homey Cloud and Homey Pro since firmware v8.1.0 (well under this app's own
      >=12.4.0 compatibility floor) and applied to custom pair/settings views without an explicit
      stylesheet <link> - matching how this file already calls Homey.emit()/Homey.showView()/
      Homey.__() with no <script src="/homey.js"> tag of its own (that bridge is confirmed working
      on a real device already, see CLAUDE.md's Not-yet-verified section; only this file's styling
      was ever the unconfirmed part). Switching to it resolves that uncertainty outright instead of
      working around it: colors, spacing, and dark mode now come from Homey's own real in-app
      theme, the same way the widget's native "device" autocomplete setting picker already does,
      rather than a guessed palette that may or may not have matched whatever Homey actually
      injects. Only the page's own structural chrome - the sticky-bottom footer holding the
      Continue button, a pattern the Style Library doesn't document - is still hand-rolled CSS
      below, and it is deliberately layout-only now: no colors, borders, or fonts guessed here.
    */
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    .page { display: flex; flex-direction: column; min-height: 100%; }
    /* Zeroed out per an on-device comparison against Homey's own list_devices step immediately
       after this one: any hand-rolled padding here, even halved from an earlier 20px 20px 8px,
       still added visible extra space beyond that native screen's own, so content shifted on the
       transition. Homey's own Style Library components carry their own internal spacing. */
    .content { flex: 1 1 auto; padding: 0; }
    /* Homey's native `.homey-header` renders its own divider under the title/subtitle block on
       a real device - not reproducible in test/homey-mock.css's approximation (see that file's
       own caveat: it only has the Style Library's class *names* to go on, not its exact CSS), so
       this was only ever visible on-device. Overridden off here per that on-device observation;
       not independently re-confirmed in this repo's own tooling. */
    .homey-header { border-bottom: none; box-shadow: none; text-align: center; }
    /* .homey-subtitle is documented as a single line of subtitle text, not multi-paragraph body
       copy, so the paragraph gap between the two <p> tags inside #instructionsText (see below)
       is this file's own structural spacing, not something the Style Library provides. */
    .homey-subtitle p { margin: 0; }
    .homey-subtitle p + p { margin-top: 12px; }
    /* Echoes the placement (though not the actual chrome) of Homey's own default pairing "Next"
       button - see driver.ts's comment on why this step uses its own button instead of that one.
       margin-top: auto pins it to the bottom when content is short, and lets it sit right after
       the content if the screen ever grows tall enough to need scrolling. */
    .footer { margin-top: auto; padding: 0; }
  </style>
</head>
<body>
  <form id="loginForm" class="page homey-form">
    <div class="content">
      <header class="homey-header">
        <h1 class="homey-title" id="titleText"></h1>
        <div class="homey-subtitle" id="instructionsText"></div>
      </header>

      <div class="homey-form-group">
        <label class="homey-form-label" id="usernameLabel" for="username"></label>
        <input class="homey-form-input" id="username" type="text" autocomplete="username" required />
      </div>

      <div class="homey-form-group">
        <label class="homey-form-label" id="passwordLabel" for="password"></label>
        <input class="homey-form-input" id="password" type="password" autocomplete="current-password" required />
      </div>

      <div class="homey-form-group">
        <label class="homey-form-label" id="regionLabel" for="region"></label>
        <select class="homey-form-select" id="region">
          <option id="regionUs" value="us"></option>
          <option id="regionOus" value="ous"></option>
          <option id="regionJp" value="jp"></option>
        </select>
      </div>
    </div>

    <div class="footer">
      <button id="submitButton" type="submit" class="homey-button-primary-full"></button>
    </div>
  </form>

  <script type="application/javascript">
    var form = document.getElementById('loginForm');
    var button = document.getElementById('submitButton');

    // Diagnostics for pairing issues: this view's own console (Homey app run's pairing
    // window devtools, or the mobile app's remote debugger) is the only visibility into what
    // actually happened client-side during a failed pair - the driver-side log (see driver.ts)
    // only sees what the client actually emitted, not what button the user pressed.
    function diag(msg, extra) {
      // eslint-disable-next-line no-console
      console.log('[dexcom-pair:login] ' + msg, extra !== undefined ? extra : '');
    }

    diag('view loaded');

    // Homey injects Homey.__() (backed by the app's own /locales/<lang>.json files) directly
    // into pair views, available synchronously - same as this file's existing direct use of
    // Homey.emit()/Homey.showView() below, no onHomeyReady-style callback needed here.
    var t = {
      title: Homey.__('pair.login.title'),
      instructions: Homey.__('pair.login.instructions'),
      usernameLabel: Homey.__('pair.login.usernameLabel'),
      passwordLabel: Homey.__('pair.login.passwordLabel'),
      regionLabel: Homey.__('pair.login.regionLabel'),
      regionUs: Homey.__('pair.login.regionUs'),
      regionOus: Homey.__('pair.login.regionOus'),
      regionJp: Homey.__('pair.login.regionJp'),
      continueLabel: Homey.__('pair.login.continue'),
      connecting: Homey.__('pair.login.connecting'),
      genericError: Homey.__('pair.login.genericError'),
    };
    document.getElementById('titleText').textContent = t.title;
    // innerHTML, not textContent: the translated string carries a <strong> tag around the
    // "person wearing the sensor" phrase plus two <p> tags for the two-paragraph copy (static,
    // non-user-controlled), same shape as the source copy - #instructionsText is a <div>, not a
    // <p>, specifically so it can legally hold those two block-level <p> children.
    document.getElementById('instructionsText').innerHTML = t.instructions;
    document.getElementById('usernameLabel').textContent = t.usernameLabel;
    document.getElementById('passwordLabel').textContent = t.passwordLabel;
    document.getElementById('regionLabel').textContent = t.regionLabel;
    document.getElementById('regionUs').textContent = t.regionUs;
    document.getElementById('regionOus').textContent = t.regionOus;
    document.getElementById('regionJp').textContent = t.regionJp;
    button.textContent = t.continueLabel;

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      button.disabled = true;
      button.classList.add('is-loading');
      button.textContent = t.connecting;

      var payload = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        region: document.getElementById('region').value,
      };

      diag('submit -> emitting login', { username: payload.username, region: payload.region });

      Homey.emit('login', payload).then(function () {
        diag('login accepted, advancing to list_devices');
        // Explicit view id, not Homey.nextView() - this step deliberately declares no
        // "navigation" in driver.compose.json (see that file's comment) so Homey doesn't also
        // render its own default chrome Continue button alongside this form's one, which
        // could otherwise be tapped to skip straight to list_devices without ever calling
        // the login handler above (surfaces there as "Please sign in first."). nextView()
        // depends on that declared navigation to know where to go, so it's not usable here -
        // showView() targets a view id directly regardless of any navigation config.
        Homey.showView('list_devices');
      }).catch(function (err) {
        diag('login rejected', (err && err.message) || err);
        button.disabled = false;
        button.classList.remove('is-loading');
        button.textContent = t.continueLabel;
        // Homey's own native alert dialog, not a hand-styled inline error box - same reasoning
        // as the rest of this file's move to the Style Library: this is exactly how a real
        // Homey pairing screen is meant to surface a failure, no color/layout guessing needed.
        Homey.alert((err && err.message) || t.genericError, 'error');
      });
    });
  </script>
</body>
</html>
