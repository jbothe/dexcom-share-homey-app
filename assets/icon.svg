<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="960" viewBox="0 0 960 960">
  <!-- Dexcom ring-mark logo (the supplied DXCM.svg brand file), recoloured black per Homey's icon
       convention: Homey tints the icon itself, so the brand green lives only in brandColor, never
       in this markup. The source file drew this mark as three paths - a green rounded-square
       background, a white "spiral" shape with a squared-off top-right corner, and a small green
       circle sitting in that shape's middle - the circle isn't a separate decoration, it's what
       punches the ring's hole: it's filled with the exact same green as the background, so the
       hole simply reads as "background colour" against whichever colour the background actually
       is. Reproducing that on a transparent canvas means combining the outer shape and the circle
       into one evenodd path rather than just deleting the circle outright - deleting it without
       also cutting the hole collapses the recognisable ring into a solid blob, losing the mark
       entirely. Laid out on the 960x960 canvas Homey wants, with 96px (10%) breathing room on all
       four sides, matching the wordmark app icon's own margin convention. The outer shape's own
       bounding box in the source viewBox (a circle of side 1197.3 starting at 162.6,223.3) is
       translated to the origin, scaled to fill the 768x768 content box, then translated back out
       to the 96px margin - re-derive the same way (translate -> scale -> translate) if the source
       mark or margin ever changes, rather than hand-nudging the numbers. -->
  <g fill="#000000">
    <g transform="translate(96, 96) scale(0.6414432473064395) translate(-162.6, -223.3)">
      <path fill-rule="evenodd" d="m760.7 223.3h558.2c22.7 0 41 18.3 41 41v557.6c0 331-268.3 598.7-598.6 598.7-330.4 0-598.7-268.3-598.7-598.7 0-330.3 268.3-598.1 598.7-598.1z M782.9 1221.1c-220.7 0-399.1-178.4-399.1-399.2 0-220.7 178.4-399.1 399.1-399.1 220.7 0 399.1 178.4 399.1 399.1 0 220.8-178.4 399.2-399.1 399.2z"/>
    </g>
  </g>
</svg>
